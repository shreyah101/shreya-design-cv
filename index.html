  ╚═══════════════════════════════════════════════════════════════╝

  HOW TO RUN THIS PROJECT:
  ─────────────────────────────────────────────────────────────────
  1. In your terminal:
       npm create vite@latest shreya-portfolio -- --template react
       cd shreya-portfolio && npm install

  2. Install Tailwind CSS:
       npm install -D tailwindcss postcss autoprefixer
       npx tailwindcss init -p

  3. In tailwind.config.js, set:
       content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"]

  4. Replace these files with the ones from this project:
       • index.html       → project root
       • src/App.jsx      → replace default App.jsx
       • src/index.css    → replace default index.css
       • src/main.jsx     → no change needed

  5. Add your images:
       • Put all design work images in /public/images/
       • Update image paths inside App.jsx (search for ← Replace)

  6. Add your resume:
       • Put Shreya_Sundli_Resume.pdf in /public/

  7. Run: npm run dev
  ─────────────────────────────────────────────────────────────────
-->
